AWSTemplateFormatVersion: '2010-09-09'
Description: 'Heart Disease Prediction System - AWS Infrastructure (FIXED)'

Parameters:
  EnvironmentName:
    Type: String
    Default: 'dev'

  LambdaArtifactBucket:
    Type: String

  LambdaArtifactKey:
    Type: String

  VpcId:
    Type: AWS::EC2::VPC::Id

  PublicSubnet1Id:
    Type: AWS::EC2::Subnet::Id

  PublicSubnet2Id:
    Type: AWS::EC2::Subnet::Id

  DBUsername:
    Type: String
    Default: admin

  DBPassword:
    Type: String
    NoEcho: true

Resources:

# ================= S3 =================
  PredictionResultsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${EnvironmentName}-results-${AWS::AccountId}-${AWS::Region}'

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${EnvironmentName}-frontend-${AWS::AccountId}-${AWS::Region}'

# ================= RDS =================
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: DB SG
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 10.0.0.0/16

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: subnet group
      SubnetIds:
        - !Ref PublicSubnet1Id
        - !Ref PublicSubnet2Id

  PredictionDB:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t3.micro
      Engine: mysql
      MasterUsername: admin
      MasterUserPassword: Admin123!
      AllocatedStorage: 20
      PubliclyAccessible: false
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref DBSecurityGroup

# ================= SNS =================
  PredictionNotificationTopic:
    Type: AWS::SNS::Topic

# ================= IAM =================
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonSNSFullAccess
        - arn:aws:iam::aws:policy/AmazonRDSFullAccess

# ================= Lambda =================
  PredictionLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.9
      Handler: lambda_function.lambda_handler
      Code:
        S3Bucket: !Ref LambdaArtifactBucket
        S3Key: !Ref LambdaArtifactKey
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          RDS_HOST: !GetAtt PredictionDB.Endpoint.Address
          RDS_PORT: !GetAtt PredictionDB.Endpoint.Port
          S3_BUCKET_NAME: !Ref PredictionResultsBucket
          SNS_TOPIC_ARN: !Ref PredictionNotificationTopic

# ================= API =================
  PredictionApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Join ["-", [!Ref EnvironmentName, "heart-api"]]

  PredictionResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PredictionApi
      ParentId: !GetAtt PredictionApi.RootResourceId
      PathPart: predict

  CognitoUserPool:
    Type: AWS::Cognito::UserPool

  CognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      RestApiId: !Ref PredictionApi
      Type: COGNITO_USER_POOLS
      ProviderARNs:
        - !GetAtt CognitoUserPool.Arn
      Name: CognitoAuth
      IdentitySource: method.request.header.Authorization

  PredictionMethod:
    Type: AWS::ApiGateway::Method
    DependsOn: CognitoAuthorizer
    Properties:
      RestApiId: !Ref PredictionApi
      ResourceId: !Ref PredictionResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PredictionLambda.Arn}/invocations'

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: PredictionMethod
    Properties:
      RestApiId: !Ref PredictionApi
      StageName: prod

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref PredictionLambda
      Principal: apigateway.amazonaws.com

# ================= CloudFront =================
  OAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: OAI

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity:
                !Join ['', ['origin-access-identity/cloudfront/', !Ref OAI]]
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none

Outputs:
  ApiEndpoint:
    Value: !Sub 'https://${PredictionApi}.execute-api.${AWS::Region}.amazonaws.com/prod'

  CloudFrontURL:
    Value: !Sub 'https://${Distribution.DomainName}'